apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: Loki
    access: proxy
    url: http://loki:3100
    jsonData:
      maxLines: 5000
      derivedFields:
        # Match OTel standard: "traceId":"<hex>"
        - datasourceUid: Tempo
          matcherRegex: '"traceId":"([a-fA-F0-9]{32})"'
          name: TraceID
          url: '${__value.raw}'
        # Match snake_case: "trace_id":"<hex>"
        - datasourceUid: Tempo
          matcherRegex: '"trace_id":"([a-fA-F0-9]{32})"'
          name: TraceID
          url: '${__value.raw}'
        # Match short 16-char trace IDs
        - datasourceUid: Tempo
          matcherRegex: '"traceId":"([a-fA-F0-9]{16})"'
          name: TraceID
          url: '${__value.raw}'

  - name: Tempo
    type: tempo
    uid: Tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: ""
      search:
        hide: false
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: Loki
      tracesToLogsV2:
        datasourceUid: Loki
        spanStartTimeShift: '-2m'
        spanEndTimeShift: '2m'
        filterByTraceID: true
        filterBySpanID: false
        customQuery: true
        query: '{job="fluentbit"} | json | trace_id=`${__trace.traceId}`'
      tracesToMetrics:
        datasourceUid: ""
