[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name   forward
    Port   24224
    Listen 0.0.0.0

[FILTER]
    Name   parser
    Match  samstore.*
    Key_Name log
    Parser docker_json
    Reserve_Data True

[OUTPUT]
    Name        loki
    Match       *
    Host        loki
    Port        3100
    Labels      job=fluentbit, container_name=$container_name, service=$container_name
    Line_Format json
